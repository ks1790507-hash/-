<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>学校探検ゲーム</title>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:black;
    }

    canvas{
      display:block;
      background:#f5f5dc;
    }

    /* 会話ボックス */
    #messageBox{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:120px;
      background:rgba(0,0,0,0.8);
      color:white;
      font-size:20px;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
      font-family:sans-serif;
    }
  </style>
</head>

<body>

  <canvas id="gameCanvas"></canvas>

  <div id="messageBox"></div>

  <script src="game.js"></script>
<!-- 会話UI -->
<div id="dialogueUI" style="
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:flex-end;
  z-index:9999;
">

  <img id="characterSprite"
       style="
         position:absolute;
         bottom:120px;
         left:50%;
         transform:translateX(-50%);
         height:400px;
       ">

  <div id="nameBox"
       style="margin-left:50px;font-size:20px;color:#aaa;">
  </div>

  <div id="textBox"
       style="
         height:140px;
         background:rgba(0,0,0,0.8);
         padding:20px;
         font-size:20px;
         color:white;
       ">
  </div>
</div>
</body>
</html>
